let isTeacherMode = false;
const SECRET_AUDIT_KEY = "MySecret2026";   // غيّر هذا المفتاح إلى شيء معقد يصعب تخمينه

function recordAuditLog(actionType, description, targetRoom = null) {
    if (!isTeacherMode) return; // التسجيل يحدث فقط أثناء جلسة المعلم
    try {
        const now = new Date();
        const payload = {
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            date: now.toISOString().split('T')[0],
            time: now.toTimeString().split(' ')[0],
            userId: "super_admin",
            username: "أ.أحمد العمر",
            role: "SuperAdmin",
            actionType: actionType,
            actionDescription: description,
            targetRoom: targetRoom,
            metadata: {
                userAgent: navigator.userAgent.substring(0, 200),
                currentPage: window.location.pathname + window.location.search,
                referrer: document.referrer || "direct"
            }
        };
        firebase.database().ref('audit_logs').push(payload).catch(e => console.warn);
    } catch(e) {}
}

// ========== الصفحة السرية لسجل التدقيق (تُفتح عبر رابط مخصص) ==========
async function showSecretAuditPage() {
    // إخفاء التطبيق الأصلي بالكامل
    document.getElementById('appContainer').style.display = 'none';
    
    // إنشاء حاوية الصفحة السرية إذا لم تكن موجودة
    let auditContainer = document.getElementById('secretAuditContainer');
    if (!auditContainer) {
        auditContainer = document.createElement('div');
        auditContainer.id = 'secretAuditContainer';
        auditContainer.style.position = 'fixed';
        auditContainer.style.top = '0';
        auditContainer.style.left = '0';
        auditContainer.style.width = '100%';
        auditContainer.style.height = '100%';
        auditContainer.style.background = 'radial-gradient(circle at 20% 30%, #c8e6c9, #a5d6a7)'; // ← خلفية مثل التطبيق
        auditContainer.style.zIndex = '99999';
        auditContainer.style.overflow = 'auto';
        auditContainer.style.padding = '30px';
        document.body.appendChild(auditContainer);
    }
    auditContainer.style.display = 'block';
    
    // عرض واجهة السجل بتصميم متناسق
    auditContainer.innerHTML = `
        <div style="max-width:1300px; margin:0 auto; background: white; border-radius: 2rem; padding: 25px; box-shadow: 0 20px 35px rgba(0,20,0,0.2); border-right: 10px solid #2c7840;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2c7840; padding-bottom: 15px; margin-bottom: 25px;">
                <h1 style="color:#1f5437;"><i class="fas fa-shield-alt"></i> سجل المراقبة الرقمي (Audit Log)</h1>
                <button id="closeSecretAuditBtn" class="btn" style="background:#2c6e3c;">العودة للتطبيق</button>
            </div>
            <div style="overflow-x: auto;">
                <table style="width:100%; border-collapse: collapse; font-family: 'Cairo', sans-serif;">
                    <thead>
                        <tr style="background: #e0f3df; color: #134b1f;">
                            <th style="padding: 12px; text-align: right;">المستخدم</th>
                            <th style="padding: 12px; text-align: right;">الإجراء</th>
                            <th style="padding: 12px; text-align: right;">الوصف</th>
                            <th style="padding: 12px; text-align: right;">المسار</th>
                            <th style="padding: 12px; text-align: right;">التوقيت</th>
                        </tr>
                    </thead>
                    <tbody id="secretAuditLogsBody" style="background: #fefdf0;"></tbody>
                </table>
            </div>
        </div>
    `;
    
    document.getElementById('closeSecretAuditBtn').addEventListener('click', () => {
        auditContainer.style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        window.history.pushState({}, document.title, window.location.pathname);
    });
    
    // جلب السجلات مع رسالة خطأ واضحة
    const tbody = document.getElementById('secretAuditLogsBody');
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">📡 جاري تحميل السجلات...</td></tr>';
    
    try {
        const logsRef = firebase.database().ref('audit_logs').orderByChild('timestamp').limitToLast(200);
        const snapshot = await logsRef.once('value');
        tbody.innerHTML = '';
        const items = [];
        snapshot.forEach(child => items.unshift({ id: child.key, ...child.val() }));
        
        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">✨ لا توجد سجلات حالياً. قم بالدخول إلى لوحة المعلم (?teacher=true) وقم ببعض الإجراءات لتظهر السجلات هنا. ✨</td></tr>';
            return;
        }
        
        items.forEach(log => {
            const row = document.createElement('tr');
            row.style.borderBottom = '1px solid #d0e8cf';
            row.style.transition = '0.2s';
            row.onmouseover = () => row.style.background = '#f1f8e9';
            row.onmouseout = () => row.style.background = 'transparent';
            row.innerHTML = `
                <td style="padding: 14px 12px;"><strong>${escapeHtml(log.username || 'مدير')}</strong><br><span style="font-size:11px; color:#2c6e3c;">${escapeHtml(log.role || 'SuperAdmin')}</span></td>
                <td style="padding: 14px 12px;"><span style="background:#2c6e3c20; color:#1f5437; padding:4px 10px; border-radius:40px; font-size:12px;">${escapeHtml(log.actionType || 'ACTION')}</span></td>
                <td style="padding: 14px 12px;">${escapeHtml(log.actionDescription || '-')}</td>
                <td style="padding: 14px 12px; font-family:monospace; font-size:12px;">${escapeHtml(log.metadata?.currentPage || '/')}</td>
                <td style="padding: 14px 12px; direction:ltr;">${log.date || ''}<br><span style="font-size:11px;">${log.time || ''}</span></td>
            `;
            tbody.appendChild(row);
        });
    } catch (error) {
        console.error("Audit log error:", error);
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#c0392b;">⚠️ حدث خطأ في تحميل السجلات. تأكد من تفعيل Realtime Database في Firebase.</td></tr>';
    }
}

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function splitSub(text) { if (!text) return []; let temp = text.replace(/\.{2,}/g, '||DOTDOT||'); let parts = temp.split(/(?:[\/،]| و | \/ |\, |\- )/); parts = parts.map(p => p.trim()).filter(p => p.length > 0); parts = parts.map(p => p.replace(/\|\|DOTDOT\|\|/g, '..')); if (parts.length === 1 && text.length > 0) return [text]; let merged = []; for (let i = 0; i < parts.length; i++) { let curr = parts[i]; if (curr.match(/\d{2,}/) && curr.includes('..') && i+1 < parts.length && parts[i+1].match(/\d{2,}/)) { curr += ' .. ' + parts[i+1]; i++; } merged.push(curr); } return merged; }
    function rebuildSubtaskIds() {
    allSubTasks = [];
    let idCounter = 0;
    currentSchedule.forEach((day, dayIdx) => {
        splitSub(day.morning).forEach(text => {
            allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'صباحية', text, subject: currentSubject });
        });
        splitSub(day.evening).forEach(text => {
            allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'مسائية', text, subject: currentSubject });
        });
    });
}
    async function loadScheduleFromFirebase(subject) {
    const docRef = db.collection('config').doc(`schedule_${subject}`);
    const doc = await docRef.get();
    if (doc.exists) {
        if (subject === 'physics') scheduleData = doc.data().days;
        else scheduleDataScience = doc.data().days;
    } else {
        if (subject === 'physics') await docRef.set({ days: scheduleData });
        else await docRef.set({ days: scheduleDataScience });
    }
}

async function saveScheduleToFirebase(subject, data) {
    const docRef = db.collection('config').doc(`schedule_${subject}`);
    await docRef.set({ days: data });
}
    // دالة تنسيق الوقت والتاريخ من timestamp (عدد milliseconds)
    function formatTimeAndDate(timestampMs) {
        if (!timestampMs) return '—';
        const date = new Date(timestampMs);
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'م' : 'ص';
        hours = hours % 12;
        if (hours === 0) hours = 12;
        const timeStr = `${hours}:${minutes} ${ampm}`;
        const day = date.getDate();
        const month = date.getMonth() + 1;
        return `${timeStr} - ${day}/${month}`;
    }

    // ترقية البيانات القديمة: تحويل completedTasks من string[] إلى {taskId, completedAt}[] مع completedAt = null
    async function upgradeStudentTasksIfNeeded() {
        const studentsSnap = await db.collection('students').get();
        const batch = db.batch();
        let needUpgrade = false;
        studentsSnap.docs.forEach(doc => {
            const data = doc.data();
            if (data.completedTasks && data.completedTasks.length > 0 && typeof data.completedTasks[0] === 'string') {
                needUpgrade = true;
                const newCompleted = data.completedTasks.map(taskId => ({ taskId, completedAt: null }));
                batch.update(doc.ref, { completedTasks: newCompleted });
            }
        });
        if (needUpgrade) await batch.commit();
    }

    async function removeTaskFromAllStudents(taskId) {
        const studentsSnap = await db.collection('students').get();
        const batch = db.batch();
        studentsSnap.docs.forEach(doc => {
            const completed = doc.data().completedTasks || [];
            const newCompleted = completed.filter(entry => entry.taskId !== taskId);
            if (newCompleted.length !== completed.length) {
                batch.update(doc.ref, { completedTasks: newCompleted });
            }
        });
        await batch.commit();
    }
    
    async function registerStudent(fullName, gender, selectedSubject = 'physics') {
    const newId = db.collection('students').doc().id;
    const studentData = {
        fullName,
        gender,
        currentSubject: selectedSubject,   // المادة النشطة حاليًا
        completedTasksPhysics: [],         // مهام الفيزياء المنجزة
        completedTasksScience: [],          // مهام العلوم المنجزة
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
    };
    await db.collection('students').doc(newId).set(studentData);
    currentStudent = { id: newId, ...studentData };
    localStorage.setItem('studentId', newId);
    return currentStudent;
}
    
    async function loadStudentData(studentId) {
    const doc = await db.collection('students').doc(studentId).get();

        currentStudent = { id: studentId, ...doc.data() };

        if (!currentStudent.completedTasksScience) currentStudent.completedTasksScience = [];
        if (!currentStudent.currentSubject) currentStudent.currentSubject = 'physics';
    } else {
        currentStudent = null;
    }
}

// تهيئة الطالب بعد اختيار المادة
async function initializeStudentWithSubject(subject) {
    // لا نحفظ currentSubject في قاعدة البيانات
    // فقط نحدث المتغيرات المحلية
    currentSubject = subject;
    // لا نعدل currentStudent.currentSubject (يبقى كما هو، لكننا لن نستخدمه مرة أخرى)
    if (subject === 'physics') {
        await loadScheduleFromFirebase('physics');
        currentSchedule = scheduleData;
    } else {
        await loadScheduleFromFirebase('science');
        currentSchedule = scheduleDataScience;
    }
    rebuildSubtaskIds();
    buildStudentUI();
    renderStudentView();
}
// تبديل المادة من داخل الواجهة (أثناء الجلسة)
async function switchSubject(subject) {
    if (subject === currentSubject) return;
    currentSubject = subject;
    if (subject === 'physics') {
        await loadScheduleFromFirebase('physics');
        currentSchedule = scheduleData;
    } else {
        await loadScheduleFromFirebase('science');
        currentSchedule = scheduleDataScience;
    }
    rebuildSubtaskIds();
    buildStudentUI();    // <-- إعادة بناء الهيكل العلوي والسفلي
    renderStudentView(); // <-- عرض المهام
    showToast(`✅ تم التبديل إلى ${subject === 'physics' ? 'الفيزياء' : 'العلوم'}`);
}

    } else {
        // للعلوم: نحدد اليوم الحالي بناءً على رقم اليوم (يبدأ من 1)
        // نحسب عدد الأيام منذ بداية الخطة؟ ببساطة: نعرض أول يوم غير مكتمل بالكامل أو اليوم الأول إذا لم يبدأ.
        // لكن لتبسيط الأمور: نعرض مهام "اليوم الأول" كافتراضي، ويمكن للمعلم تعديلها لاحقًا.
        // الأفضل: نعرض أول يوم لم يكتمل.
        let firstIncompleteDay = null;
        for (let idx = 0; idx < currentSchedule.length; idx++) {
            const dayTasks = allSubTasks.filter(t => t.dayIndex === idx);
            const allCompleted = dayTasks.every(t => completedMap.has(t.id));
            if (!allCompleted) { firstIncompleteDay = idx; break; }
        }
        if (firstIncompleteDay === null && currentSchedule.length > 0) firstIncompleteDay = currentSchedule.length - 1;

            todayTasks = allSubTasks.filter(t => t.dayIndex === firstIncompleteDay);
        }
    }
    
    if (todayTasks.length === 0) {
    if (currentSubject === 'physics') {

        const lastDay = scheduleData[scheduleData.length - 1];

            // تحويل تاريخ اليوم وتاريخ آخر يوم لمقارنة بسيطة (تجاهل السنة)

            }

    // عرض مهام الطالب مع الوقت والتاريخ فقط
    async function showStudentTasks(studentId) {
        await loadAllStudents();
        const student = allStudents.find(s => s.id === studentId);
        if (!student) return;
        const completedEntries = student.completedTasks || [];
        const completedTasksList = completedEntries.map(entry => {
            const task = allSubTasks.find(t => t.id === entry.taskId);
            if (!task) return null;
            const day = scheduleData[task.dayIndex];
            return {
                text: task.text,
                completedAt: entry.completedAt,
                date: day ? day.date : '?'
            };
        }).filter(t => t !== null);
        
        document.getElementById('studentTasksTitle').innerHTML = `✅ مهام ${student.fullName} المنجزة (${completedTasksList.length}/${allSubTasks.length})`;
        const container = document.getElementById('studentTasksList');
        if (completedTasksList.length === 0) {
            container.innerHTML = '<div class="student-task-card" style="justify-content:center;">📭 لا توجد مهام منجزة بعد</div>';
        } else {
            container.innerHTML = completedTasksList.map(task => {
                const timeDateStr = formatTimeAndDate(task.completedAt);
                return `
                    <div class="student-task-card">
                        <i class="fas fa-check-circle student-task-icon"></i>
                        <div style="flex:1;">
                            <div style="font-weight:bold;">${escapeHtml(task.text)}</div>
                            <div style="font-size:0.75rem; color:#4a6741;">🕒 ${timeDateStr}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        const modal = document.getElementById('studentTasksModal');
        modal.style.zIndex = '2000';
        modal.classList.add('active');
    }

    function reindexEditItems(dayIdx) { document.querySelectorAll(`#mornEditList-${dayIdx} input, #evenEditList-${dayIdx} input`).forEach((inp, newIdx) => { inp.setAttribute('data-idx', newIdx); }); document.querySelectorAll(`#mornEditList-${dayIdx} .delete-subtask, #evenEditList-${dayIdx} .delete-subtask`).forEach((delBtn, newIdx) => { delBtn.setAttribute('data-idx', newIdx); }); }

    async function saveScheduleChanges() {
    recordAuditLog("DATA_MODIFY", "المعلم قام بحفظ التعديلات الجديدة على الخطة الدراسية");
        const newDays = [];
        for (let i = 0; i < scheduleData.length; i++) {
            const morningInputs = document.querySelectorAll(`#mornEditList-${i} input`);
            const eveningInputs = document.querySelectorAll(`#evenEditList-${i} input`);
            const morningTexts = Array.from(morningInputs).map(inp => inp.value.trim()).filter(t => t);
            const eveningTexts = Array.from(eveningInputs).map(inp => inp.value.trim()).filter(t => t);
            newDays.push({ date: scheduleData[i].date, weekday: scheduleData[i].weekday, morning: morningTexts.join(' / '), evening: eveningTexts.join(' / ') });
        }
        
        let tempSubTasks = []; 
        let idCounter = 0;
        newDays.forEach((day, dayIdx) => { 
            splitSub(day.morning).forEach(text => { tempSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'صباحية', text }); }); 
            splitSub(day.evening).forEach(text => { tempSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'مسائية', text }); }); 
        });
        
        // نقل البيانات القديمة إلى الجديدة
        const taskTransferMap = new Map();
        for (let newTask of tempSubTasks) {
            const oldTask = allSubTasks.find(t => t.dayIndex === newTask.dayIndex && t.period === newTask.period && t.text === newTask.text);
            if (oldTask) taskTransferMap.set(newTask.id, oldTask.id);
        }
        
        scheduleData = newDays;
        await saveScheduleToFirebase();
        
        // حذف المهام التي لم تعد موجودة من كل الطلاب
        const oldTaskIds = allSubTasks.map(t => t.id);
        const newTaskIds = tempSubTasks.map(t => t.id);
        const removedTaskIds = oldTaskIds.filter(id => !newTaskIds.includes(id));
        for (let id of removedTaskIds) await removeTaskFromAllStudents(id);
        
        // تحديث taskId للمهام التي تغير id ولكنها نفس المحتوى
        const studentsSnap = await db.collection('students').get();
        const batch = db.batch();
        for (const doc of studentsSnap.docs) {
            let completed = doc.data().completedTasks || [];
            let updated = false;
            for (let [newId, oldId] of taskTransferMap.entries()) {
                const entry = completed.find(e => e.taskId === oldId);
                if (entry) {
                    completed = completed.filter(e => e.taskId !== oldId);
                    completed.push({ taskId: newId, completedAt: entry.completedAt });
                    updated = true;
                }
            }
            if (updated) {
                batch.update(doc.ref, { completedTasks: completed });
            }
        }
        await batch.commit();
        
        await loadAllStudents();
        if (adminAuthenticated) await renderTeacherView(); 
        else if (currentStudent) renderStudentView();
        
        document.getElementById('editScheduleModal').classList.remove('active');
        showCustomModal("تم حفظ التغييرات بنجاح");
    }

    let audioCtx = null;
    function playBeep() { try { if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = 880; gain.gain.value = 0.15; osc.type = 'sine'; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); osc.stop(audioCtx.currentTime + 0.3); if (audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) { } }

    // جسيمات الخلفية
    const canvas = document.getElementById('particles-canvas'); const ctx = canvas.getContext('2d'); let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function createParticles() { particles = []; for (let i = 0; i < 70; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 4 + 2, speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.3, color: `rgba(60,120,70,${Math.random() * 0.3 + 0.1})` }); }
    function drawParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let p of particles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); p.x += p.speedX; p.y += p.speedY; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; } requestAnimationFrame(drawParticles); }
    resizeCanvas(); createParticles(); drawParticles(); window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });

    let audioCtxPhysics = null;
    function initAudioPhysics() {
        if (!audioCtxPhysics) {
            try {
                audioCtxPhysics = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {}
        }
        if (audioCtxPhysics && audioCtxPhysics.state === 'suspended') audioCtxPhysics.resume();
    }
    function playClickSound() {
        try {
            initAudioPhysics();
            if (!audioCtxPhysics) return;
            const osc = audioCtxPhysics.createOscillator();
            const gain = audioCtxPhysics.createGain();
            osc.connect(gain);
            gain.connect(audioCtxPhysics.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.08;
            osc.type = 'sine';
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtxPhysics.currentTime + 0.15);
            osc.stop(audioCtxPhysics.currentTime + 0.15);
            if (audioCtxPhysics.state === 'suspended') audioCtxPhysics.resume();
        } catch(e) {}
    }
    document.addEventListener('click', function(e) {
        if (e.target.closest('.btn, .btn-icon, .detail-btn, .add-subtask-btn, #confirmSaveSchedule, #editScheduleBtnTeacher, #studentsListBtn, .subtask-check')) {
            playClickSound();
        }
    });
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast-physics');
        if (!toast) return;
        toast.textContent = message;
        toast.classList.remove('show', 'error');
        if (isError) toast.classList.add('error');
        void toast.offsetWidth;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 2400);
    }
    addModals();
    initApp();
