        { date: "1/6", weekday: "الاثنين", morning: "كهراطيسيه مع نموذج", evening: "تحريض / نموذج مشترك كهراطيسيه تحريض" },
        { date: "2/6", weekday: "الثلاثاء", morning: "دارات مهتزه مع نظري المتناوب", evening: "عملي تيار متناوب تسلسل حل مسائل (5 درس~2005~22 عامه ~20 عامه) مع دورات تسلسل" },
        { date: "3/6", weekday: "الأربعاء", morning: "تتمه متناوب تفرع مع تدريب مسائل تفرع 21 عامه ~23 عامه ~ مساله 4 درس", evening: "محوله كهربائيه وحل نموذج دارات متناوب محوله" },
        { date: "4/6", weekday: "الخميس", morning: "حل وحضور نماذج الامتحانيه الشامله", evening: "حل نماذج شامله من دورات" },
        { date: "5/6", weekday: "الجمعة", morning: "حل نماذج", evening: "حل نماذج" }
    ];

    let allSubTasks = []; // { id, dayIndex, period, text }
    let currentStudent = null;
    let allStudents = [];
    let isAdmin = false;
    let adminAuthenticated = false;
    const ADMIN_PASSWORD = "admin2026";

    // دوال مساعدة
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function splitSub(text) {
        if (!text) return [];
        let temp = text.replace(/\.{2,}/g, '||DOTDOT||');
        let parts = temp.split(/(?:[\/،]| و | \/ |\, |\- )/);
        parts = parts.map(p => p.trim()).filter(p => p.length > 0);
        parts = parts.map(p => p.replace(/\|\|DOTDOT\|\|/g, '..'));
        if (parts.length === 1 && text.length > 0) return [text];
        let merged = [];
        for (let i = 0; i < parts.length; i++) {
            let curr = parts[i];
            if (curr.match(/\d{2,}/) && curr.includes('..') && i + 1 < parts.length && parts[i + 1].match(/\d{2,}/)) {
                curr += ' .. ' + parts[i + 1];
                i++;
            }
            merged.push(curr);
        }
        return merged;
    }

    function rebuildSubtaskIds() {
        allSubTasks = [];
        let idCounter = 0;
        scheduleData.forEach((day, dayIdx) => {
            splitSub(day.morning).forEach(text => {
                allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'صباحية', text });
            });
            splitSub(day.evening).forEach(text => {
                allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'مسائية', text });
            });
        });
    }

    // Firebase: تحميل الخطة
    async function loadScheduleFromFirebase() {
        const docRef = db.collection('config').doc('schedule');
        const doc = await docRef.get();
        if (doc.exists) {
            scheduleData = doc.data().days;
        } else {
            await docRef.set({ days: scheduleData });
        }
        rebuildSubtaskIds();
    }

    async function saveScheduleToFirebase() {
        await db.collection('config').doc('schedule').set({ days: scheduleData });
        rebuildSubtaskIds();
        // مسح تقدم جميع الطلاب
        const studentsSnap = await db.collection('students').get();
        const batch = db.batch();
        studentsSnap.docs.forEach(doc => {
            batch.update(doc.ref, { completedTasks: [] });
        });
        await batch.commit();
        await loadAllStudents();
        if (currentStudent && !isAdmin) await loadStudentData(currentStudent.id);
    }

    // إدارة الطلاب
    async function registerStudent(fullName, gender) {
        const newId = db.collection('students').doc().id;
        const studentData = {
            fullName: fullName,
            gender: gender,
            completedTasks: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection('students').doc(newId).set(studentData);
        currentStudent = { id: newId, ...studentData };
        localStorage.setItem('studentId', newId);
        return currentStudent;
    }

    async function loadStudentData(studentId) {
        const doc = await db.collection('students').doc(studentId).get();
        if (doc.exists) {
            currentStudent = { id: studentId, ...doc.data() };
        } else {
            currentStudent = null;
        }
    }

    async function saveStudentProgress(studentId, completedTasksArray) {
        await db.collection('students').doc(studentId).update({
            completedTasks: completedTasksArray,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    async function loadAllStudents() {
        const snapshot = await db.collection('students').get();
        allStudents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    // عرض واجهة الطالب (بتصميم أنيق)
    function renderStudentView() {
        if (!currentStudent) return;
        const completedSet = new Set(currentStudent.completedTasks || []);
        const totalTasks = allSubTasks.length;
        const completedCount = completedSet.size;
        document.getElementById('globalDone').innerText = completedCount;
        document.getElementById('globalTotal').innerText = totalTasks;
        document.getElementById('globalProgressFill').style.width = `${totalTasks === 0 ? 0 : (completedCount / totalTasks) * 100}%`;

        const todayStr = `${new Date().getDate()}/${new Date().getMonth() + 1}`;
        const todayTasks = allSubTasks.filter(t => scheduleData[t.dayIndex]?.date === todayStr);
        const todayContainer = document.getElementById('todayTasksList');
        todayContainer.innerHTML = '';
        todayTasks.forEach(task => {
            const div = document.createElement('div'); div.className = `subtask-item ${completedSet.has(task.id) ? 'completed-subtask' : ''}`;
            div.innerHTML = `<input type="checkbox" class="subtask-check" data-id="${task.id}" ${completedSet.has(task.id) ? 'checked' : ''}><span class="subtask-text">${escapeHtml(task.text)} <span style="font-size:0.7rem; background:#dcf5d5; padding:2px 8px; border-radius:20px;">${task.period}</span></span>`;
            todayContainer.appendChild(div);
        });

        const daysContainer = document.getElementById('allDaysContainer');
        daysContainer.innerHTML = '';
        scheduleData.forEach((day, idx) => {
            const morningTasks = allSubTasks.filter(t => t.dayIndex === idx && t.period === 'صباحية');
            const eveningTasks = allSubTasks.filter(t => t.dayIndex === idx && t.period === 'مسائية');
            const completed = morningTasks.filter(t => completedSet.has(t.id)).length + eveningTasks.filter(t => completedSet.has(t.id)).length;
            const total = morningTasks.length + eveningTasks.length;
            const percent = total === 0 ? 0 : (completed / total) * 100;
            const isToday = (day.date === todayStr);
            const dayCard = document.createElement('div'); dayCard.className = `day-card ${isToday ? 'today-active' : ''}`;
            dayCard.innerHTML = `
                <div class="day-header"><div class="day-date">${day.date}</div><div style="background:#2c6e3c; color:white; padding:0.2rem 1rem; border-radius:50px;">${day.weekday}</div></div>
                <div style="padding:0.5rem 1.8rem; font-weight:bold;">📊 التقدم: ${completed}/${total} <div class="progress-bg" style="width:110px; height:8px; display:inline-block; margin-right:8px;"><div style="width:${percent}%; height:100%; background:#2e7d32; border-radius:40px;"></div></div></div>
                <div style="padding:0.5rem 1.5rem 1.2rem 1.5rem;" id="dayContent-${idx}"></div>
            `;
            daysContainer.appendChild(dayCard);
            const periodDiv = dayCard.querySelector(`#dayContent-${idx}`);
            if (morningTasks.length) {
                const mornBlock = document.createElement('div');
                mornBlock.innerHTML = `<div class="period-title" style="font-size:1.25rem; font-weight:800; margin:0.8rem 0; display:flex; align-items:center; gap:12px; border-right:4px solid #3c8c40; padding-right:12px;"><i class="fas fa-sun"></i> الفترة الصباحية</div><div id="mornList-${idx}"></div>`;
                periodDiv.appendChild(mornBlock);
                const mornList = mornBlock.querySelector(`#mornList-${idx}`);
                morningTasks.forEach(task => {
                    const taskDiv = document.createElement('div'); taskDiv.className = `subtask-item ${completedSet.has(task.id) ? 'completed-subtask' : ''}`;
                    taskDiv.innerHTML = `<input type="checkbox" class="subtask-check" data-id="${task.id}" ${completedSet.has(task.id) ? 'checked' : ''}><span>${escapeHtml(task.text)}</span>`;
                    mornList.appendChild(taskDiv);
                });
            }
            if (eveningTasks.length) {
                const evenBlock = document.createElement('div');
                evenBlock.innerHTML = `<div class="period-title" style="font-size:1.25rem; font-weight:800; margin:0.8rem 0; display:flex; align-items:center; gap:12px; border-right:4px solid #3c8c40; padding-right:12px;"><i class="fas fa-moon"></i> الفترة المسائية</div><div id="evenList-${idx}"></div>`;
                periodDiv.appendChild(evenBlock);
                const evenList = evenBlock.querySelector(`#evenList-${idx}`);
                eveningTasks.forEach(task => {
                    const taskDiv = document.createElement('div'); taskDiv.className = `subtask-item ${completedSet.has(task.id) ? 'completed-subtask' : ''}`;
                    taskDiv.innerHTML = `<input type="checkbox" class="subtask-check" data-id="${task.id}" ${completedSet.has(task.id) ? 'checked' : ''}><span>${escapeHtml(task.text)}</span>`;
                    evenList.appendChild(taskDiv);
                });
            }
        });
        attachTaskCheckEvents();
    }

    function attachTaskCheckEvents() {
        document.querySelectorAll('.subtask-check').forEach(cb => {
            cb.removeEventListener('change', handleTaskToggle);
            cb.addEventListener('change', handleTaskToggle);
        });
    }

    async function handleTaskToggle(e) {
        const cb = e.target;
        const taskId = cb.getAttribute('data-id');
        if (!currentStudent) return;
        let completed = currentStudent.completedTasks || [];
        if (cb.checked) {
            if (!completed.includes(taskId)) completed.push(taskId);
        } else {
            completed = completed.filter(id => id !== taskId);
        }
        currentStudent.completedTasks = completed;
        await saveStudentProgress(currentStudent.id, completed);
        renderStudentView();
        playBeep();
    }

    // عرض واجهة المعلم (نفس تصميم الطالب مع أزرار تفاصيل)

            todayContainer.appendChild(div);
        });

        const daysContainer = document.getElementById('allDaysContainer');
        daysContainer.innerHTML = '';
        scheduleData.forEach((day, idx) => {
            const morningTasks = allSubTasks.filter(t => t.dayIndex === idx && t.period === 'صباحية');
            const eveningTasks = allSubTasks.filter(t => t.dayIndex === idx && t.period === 'مسائية');
            const isToday = (day.date === todayStr);
            const dayCard = document.createElement('div'); dayCard.className = `day-card ${isToday ? 'today-active' : ''}`;
            dayCard.innerHTML = `
                <div class="day-header"><div class="day-date">${day.date}</div><div style="background:#2c6e3c; color:white; padding:0.2rem 1rem; border-radius:50px;">${day.weekday}</div></div>
                <div style="padding:0.5rem 1.5rem 1.2rem 1.5rem;" id="dayContent-${idx}"></div>
            `;
            daysContainer.appendChild(dayCard);
            const periodDiv = dayCard.querySelector(`#dayContent-${idx}`);
            if (morningTasks.length) {
                const mornBlock = document.createElement('div');
                mornBlock.innerHTML = `<div class="period-title" style="font-size:1.25rem; font-weight:800; margin:0.8rem 0; display:flex; align-items:center; gap:12px; border-right:4px solid #3c8c40; padding-right:12px;"><i class="fas fa-sun"></i> الفترة الصباحية</div><div id="mornList-${idx}"></div>`;
                periodDiv.appendChild(mornBlock);
                const mornList = mornBlock.querySelector(`#mornList-${idx}`);
                morningTasks.forEach(task => {
                    const taskDiv = document.createElement('div'); taskDiv.className = 'subtask-item';
                    taskDiv.innerHTML = `<span>${escapeHtml(task.text)}</span><button class="detail-btn" data-task-id="${task.id}">📊 تفاصيل</button>`;
                    mornList.appendChild(taskDiv);
                });
            }
            if (eveningTasks.length) {
                const evenBlock = document.createElement('div');
                evenBlock.innerHTML = `<div class="period-title" style="font-size:1.25rem; font-weight:800; margin:0.8rem 0; display:flex; align-items:center; gap:12px; border-right:4px solid #3c8c40; padding-right:12px;"><i class="fas fa-moon"></i> الفترة المسائية</div><div id="evenList-${idx}"></div>`;
                periodDiv.appendChild(evenBlock);
                const evenList = evenBlock.querySelector(`#evenList-${idx}`);
                eveningTasks.forEach(task => {
                    const taskDiv = document.createElement('div'); taskDiv.className = 'subtask-item';
                    taskDiv.innerHTML = `<span>${escapeHtml(task.text)}</span><button class="detail-btn" data-task-id="${task.id}">📊 تفاصيل</button>`;
                    evenList.appendChild(taskDiv);
                });
            }
        });
        // ربط أزرار التفاصيل
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const taskId = btn.getAttribute('data-task-id');
                showTaskDetails(taskId);
            });
        });
        // إخفاء stats-panel لأن المعلم لا يحتاجها
        const statsPanel = document.querySelector('.stats-panel');
        if (statsPanel) statsPanel.style.display = 'none';
    }

    async function showTaskDetails(taskId) {
        const task = allSubTasks.find(t => t.id === taskId);
        if (!task) return;
        await loadAllStudents();
        const completedStudents = allStudents.filter(s => (s.completedTasks || []).includes(taskId));
        const males = completedStudents.filter(s => s.gender === 'ذكر');
        const females = completedStudents.filter(s => s.gender === 'أنثى');
        const totalStudents = allStudents.length;
        const total = completedStudents.length;
        const modal = document.getElementById('taskStatsModal');
        document.getElementById('taskStatTitle').innerHTML = `المهمة: ${task.text}`;
        document.getElementById('totalCount').innerText = `${total} / ${totalStudents}`;
        document.getElementById('totalPercent').innerText = totalStudents === 0 ? 0 : ((total / totalStudents) * 100).toFixed(1);
        document.getElementById('maleCount').innerText = `${males.length} / ${allStudents.filter(s => s.gender === 'ذكر').length}`;
        document.getElementById('malePercent').innerText = totalStudents === 0 ? 0 : ((males.length / totalStudents) * 100).toFixed(1);
        document.getElementById('femaleCount').innerText = `${females.length} / ${allStudents.filter(s => s.gender === 'أنثى').length}`;
        document.getElementById('femalePercent').innerText = totalStudents === 0 ? 0 : ((females.length / totalStudents) * 100).toFixed(1);
        const listDiv = document.getElementById('studentsCompletedList');
        listDiv.innerHTML = '<h5>الذكور</h5>';
        males.forEach(s => {
            const div = document.createElement('div'); div.className = 'student-item';
            div.innerHTML = `<span class="student-name" data-student-id="${s.id}">${escapeHtml(s.fullName)}</span><span class="badge-male">ذكر</span>`;
            listDiv.appendChild(div);
        });
        listDiv.innerHTML += '<h5>الإناث</h5>';
        females.forEach(s => {
            const div = document.createElement('div'); div.className = 'student-item';
            div.innerHTML = `<span class="student-name" data-student-id="${s.id}">${escapeHtml(s.fullName)}</span><span class="badge-female">أنثى</span>`;
            listDiv.appendChild(div);
        });
        modal.classList.add('active');
        // ربط حدث النقر على اسم الطالب لعرض مهامه
        document.querySelectorAll('.student-name').forEach(el => {
            el.addEventListener('click', async () => {
                const studentId = el.getAttribute('data-student-id');
                await showStudentTasks(studentId);
            });
        });
    }

    async function showStudentTasks(studentId) {
        const student = allStudents.find(s => s.id === studentId);
        if (!student) return;
        const completedIds = new Set(student.completedTasks || []);
        const completedTasksList = allSubTasks.filter(t => completedIds.has(t.id)).map(t => `${t.text} (${t.period} - ${scheduleData[t.dayIndex]?.date})`);
        document.getElementById('studentTasksTitle').innerHTML = `مهام ${student.fullName} المنجزة (${completedTasksList.length}/${allSubTasks.length})`;
        const container = document.getElementById('studentTasksList');
        container.innerHTML = completedTasksList.length ? completedTasksList.map(txt => `<div>✅ ${escapeHtml(txt)}</div>`).join('') : '<div>لا توجد مهام منجزة بعد</div>';
        document.getElementById('studentTasksModal').classList.add('active');
    }

    // تعديل الخطة (واجهة بسيطة للمعلم)
    async function openEditSchedule() {
        const editDiv = document.getElementById('editScheduleFields');
        editDiv.innerHTML = '';
        scheduleData.forEach((day, idx) => {
            const dayDiv = document.createElement('div'); dayDiv.className = 'edit-day-item';
            dayDiv.innerHTML = `<div class="edit-day-header">📅 ${day.date} - ${day.weekday}</div>
                <div class="period-edit"><label>الفترة الصباحية:</label><textarea id="mornEdit-${idx}" rows="2">${escapeHtml(day.morning)}</textarea></div>
                <div class="period-edit"><label>الفترة المسائية:</label><textarea id="evenEdit-${idx}" rows="2">${escapeHtml(day.evening)}</textarea></div>
            `;
            editDiv.appendChild(dayDiv);
        });
        document.getElementById('editScheduleModal').classList.add('active');
    }

    async function saveScheduleChanges() {
        if (!confirm("⚠️ تحذير: تعديل الخطة سيؤدي إلى حذف تقدم جميع الطلاب. هل أنت متأكد؟")) return;
        const newDays = [];
        for (let i = 0; i < scheduleData.length; i++) {
            const mornVal = document.getElementById(`mornEdit-${i}`).value;
            const evenVal = document.getElementById(`evenEdit-${i}`).value;
            newDays.push({
                date: scheduleData[i].date,
                weekday: scheduleData[i].weekday,
                morning: mornVal,
                evening: evenVal
            });
        }
        scheduleData = newDays;
        await saveScheduleToFirebase();
        await loadScheduleFromFirebase();
        await loadAllStudents();
        if (adminAuthenticated) {
            await renderTeacherView();
        } else if (currentStudent) {
            renderStudentView();
        }
        document.getElementById('editScheduleModal').classList.remove('active');
        alert("تم تحديث الخطة وحذف تقدم الطلاب القديم");
    }

    // الصوت
    let audioCtx = null;
    function playBeep() {
        try {
            if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.15;
            osc.type = 'sine';
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch (e) { }
    }

    // جسيمات الخلفية
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function createParticles() { particles = []; for (let i = 0; i < 70; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 4 + 2, speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.3, color: `rgba(60,120,70,${Math.random() * 0.3 + 0.1})` }); }
    function drawParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let p of particles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); p.x += p.speedX; p.y += p.speedY; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; } requestAnimationFrame(drawParticles); }
    resizeCanvas(); createParticles(); drawParticles(); window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });

    // تهيئة التطبيق حسب رابط الدخول
    async function initApp() {
        await loadScheduleFromFirebase();
        const urlParams = new URLSearchParams(window.location.search);
        const isTeacherRequest = urlParams.get('teacher') === 'true';
        if (isTeacherRequest) {
            // عرض شاشة إدخال كلمة السر للمعلم
            isAdmin = true;
            const overlay = document.createElement('div');
            overlay.className = 'admin-login-overlay';
            overlay.innerHTML = `
                <div class="admin-login-card">
                    <i class="fas fa-chalkboard-user"></i>
                    <h2>دخول المشرف</h2>
                    <input type="password" id="adminPassword" placeholder="كلمة السر">
                    <button id="submitAdminLogin">تأكيد</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('submitAdminLogin').addEventListener('click', async () => {
                const pwd = document.getElementById('adminPassword').value;
                if (pwd === ADMIN_PASSWORD) {
                    adminAuthenticated = true;
                    overlay.remove();
                    // بناء واجهة المعلم
                    document.getElementById('appContainer').innerHTML = `
                        <div class="hero-area">
                            <div class="logo-title"><h1><i class="fas fa-chalkboard-user"></i> لوحة تحكم المشرف - فيزياء 2026</h1></div>
                            <button id="editScheduleBtnTeacher" class="btn-icon"><i class="fas fa-edit"></i> تعديل الخطة</button>
                        </div>
                        <div class="today-highlight" id="todaySpotlight">
                            <div style="font-weight:800;"><i class="fas fa-calendar-day"></i> مهام اليوم</div>
                            <div id="todayTasksList"></div>
                        </div>
                        <div id="allDaysContainer"></div>
                        <div class="motivational-board">✨ يمكنك الضغط على "تفاصيل" لمعرفة الطلاب المنجزين لكل مهمة ✨</div>
                        <div class="footer-quote">🌟 أ.أحمد العمر 🌟<br>قد نتعب نعم لكننا اصحاب هدف</div>
                    `;
                    await renderTeacherView();
                    document.getElementById('editScheduleBtnTeacher').addEventListener('click', openEditSchedule);
                } else {
                    alert('كلمة سر غير صحيحة');
                }
            });
        } else {
            // وضع الطالب: عرض شاشة تسجيل الاسم
            const storedId = localStorage.getItem('studentId');
            if (storedId) {
                await loadStudentData(storedId);
                if (currentStudent) {
                    buildStudentUI();
                    renderStudentView();
                    return;
                }
            }
            // عرض شاشة تسجيل الطالب
            const overlay = document.createElement('div');
            overlay.className = 'admin-login-overlay';
            overlay.innerHTML = `
                <div class="admin-login-card">
                    <i class="fas fa-user-graduate"></i>
                    <h2>مرحباً! أدخل بياناتك</h2>
                    <input type="text" id="studentFullName" placeholder="الاسم الثلاثي">
                    <select id="studentGender">
                        <option value="ذكر">ذكر</option>
                        <option value="أنثى">أنثى</option>
                    </select>
                    <button id="submitStudentData">بدء المتابعة</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('submitStudentData').addEventListener('click', async () => {
                const name = document.getElementById('studentFullName').value.trim();
                const gender = document.getElementById('studentGender').value;
                if (!name) { alert('الرجاء إدخال الاسم الثلاثي'); return; }
                await registerStudent(name, gender);
                overlay.remove();
                buildStudentUI();
                renderStudentView();
            });
        }
    }

    function buildStudentUI() {
        document.getElementById('appContainer').innerHTML = `
            <div class="hero-area">
                <div class="logo-title"><h1><i class="fas fa-seedling"></i> 📘 الخطة الامتحانية – فيزياء <i class="fas fa-flask"></i></h1></div>
            </div>
            <div class="today-highlight" id="todaySpotlight">
                <div style="font-weight:800; margin-bottom:8px;"><i class="fas fa-calendar-day"></i> 🟢 مهام اليوم المباشرة</div>
                <div id="todayTasksList"></div>
            </div>
            <div class="stats-panel">
                <div><i class="fas fa-chart-line"></i> الإنجاز الكلي: <strong id="globalDone">0</strong> / <strong id="globalTotal">0</strong></div>
                <div class="progress-bg"><div class="progress-fill-global" id="globalProgressFill"></div></div>
            </div>
            <div id="allDaysContainer"></div>
            <div class="motivational-board">
                <i class="fas fa-star-of-life"></i> السبت 6/6 : التقديم الممتاز للامتحان إن شاء الله <i class="fas fa-star-of-life"></i><br>
                <span>✨ ثقة، مراجعة ذهنية، ودعوات ✨</span>
            </div>
            <div class="footer-quote">
                🌟 أ.أحمد العمر 🌟<br>
                <span>قد نتعب نعم لكننا اصحاب هدف</span>
            </div>
        `;
    }

    // إضافة المودالات إلى body
    function addModals() {
        const modalHTML = `
            <div id="taskStatsModal" class="modal">
                <div class="modal-content">
                    <h3 id="taskStatTitle"></h3>
                    <div><strong>إجمالي المنجزين:</strong> <span id="totalCount"></span> (<span id="totalPercent"></span>%)</div>
                    <div><strong>الذكور:</strong> <span id="maleCount"></span> (<span id="malePercent"></span>%)</div>
                    <div><strong>الإناث:</strong> <span id="femaleCount"></span> (<span id="femalePercent"></span>%)</div>
                    <hr>
                    <h4>قائمة الطلاب المنجزين</h4>
                    <div id="studentsCompletedList"></div>
                    <button class="btn" id="closeStatsModal">إغلاق</button>
                </div>
            </div>
            <div id="studentTasksModal" class="modal">
                <div class="modal-content">
                    <h3 id="studentTasksTitle"></h3>
                    <div id="studentTasksList"></div>
                    <button class="btn" id="closeStudentTasksModal">إغلاق</button>
                </div>
            </div>
            <div id="editScheduleModal" class="modal">
                <div class="modal-content" style="max-width:900px;">
                    <h3>تعديل الخطة (سيؤدي لحذف تقدم جميع الطلاب)</h3>
                    <div id="editScheduleFields"></div>
                    <div class="flex-between mt-2">
                        <button id="confirmSaveSchedule" class="btn">حفظ التغييرات</button>
                        <button id="cancelEditSchedule" class="btn btn-danger">إلغاء</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        document.getElementById('closeStatsModal')?.addEventListener('click', () => document.getElementById('taskStatsModal').classList.remove('active'));
        document.getElementById('closeStudentTasksModal')?.addEventListener('click', () => document.getElementById('studentTasksModal').classList.remove('active'));
        document.getElementById('cancelEditSchedule')?.addEventListener('click', () => document.getElementById('editScheduleModal').classList.remove('active'));
        document.getElementById('confirmSaveSchedule')?.addEventListener('click', saveScheduleChanges);
    }

    addModals();
    initApp();
</script>
