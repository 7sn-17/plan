.particle-burst {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd700, #ff8c00);
    pointer-events: none;
    z-index: 10000;
    animation: particleFly 0.6s ease-out forwards;
}
@keyframes particleFly {
    0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.8;
    }
    100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0;
    }
}

        return localStorage.getItem(key);

async function safeFirebaseGet(docRef, timeoutMs = 5000) {
    const timeoutPromise = new Promise((_, reject) => 
        setTimeout(() => reject(new Error('انتهى وقت الاتصال بقاعدة البيانات')), timeoutMs)
    );
    const getPromise = docRef.get();
    const result = await Promise.race([getPromise, timeoutPromise]);
    return result;
}

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    function extractDuration(text) {
    // تدعم صيغة {3} أو {2.5}
    let match = text.match(/\{(\d+(?:\.\d+)?)\}/);
    if (match) return parseFloat(match[1]);
    return null;
}

function cleanTaskText(rawText) {
    // تحذف {3} أو {2.5} من نهاية النص
    return rawText.replace(/\s*\{[\d\.]+\}\s*$/, '').trim();
}

    function splitSub(text) {
    if (!text) return [];
    // 1. تقسيم على الأسطر الجديدة أولاً
    const lines = text.split(/\n/);
    const tasks = [];
    for (let line of lines) {
        line = line.trim();
        if (line === '') continue;
        // 2. إذا كان السطر يحتوي على '/'، نقسمه على '/' مع المسافات المحيطة
        if (line.includes('/')) {
            const parts = line.split(/\s*\/\s*/);
            for (let part of parts) {
                if (part.trim()) tasks.push(part.trim());
            }
        } else {
            tasks.push(line);
        }
    }
    return tasks;
}

    function rebuildSubtaskIds() {
        allSubTasks = [];
        let idCounter = 0;
        currentSchedule.forEach((day, dayIdx) => {
            let morningTasks = splitSub(day.morning);
            morningTasks.forEach(taskText => {
                let duration = (currentSubject === 'science') ? extractDuration(taskText) : null;
                allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'صباحية', text: taskText, duration: duration, subject: currentSubject });
            });
            let eveningTasks = splitSub(day.evening);
            eveningTasks.forEach(taskText => {
                let duration = (currentSubject === 'science') ? extractDuration(taskText) : null;
                allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'مسائية', text: taskText, duration: duration, subject: currentSubject });
            });
        });
    }

    if (doc.exists) {

        else scheduleDataScience = doc.data().days;

    function formatTimeAndDate(timestampMs) {
        if (!timestampMs) return '—';
        const date = new Date(timestampMs);
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'م' : 'ص';
        hours = hours % 12;
        if (hours === 0) hours = 12;
        const timeStr = `${hours}:${minutes} ${ampm}`;
        const day = date.getDate();
        const month = date.getMonth() + 1;
        return `${timeStr} - ${day}/${month}`;
    }

            if (newCompleted.length !== completed.length) batch.update(doc.ref, { [field]: newCompleted });

        await batch.commit();

    async function handleDelete(e) { const btn = e.currentTarget; const dayIdx = parseInt(btn.dataset.day); const period = btn.dataset.period; const idx = parseInt(btn.dataset.idx); const container = period === 'morning' ? document.getElementById(`mornEditList-${dayIdx}`) : document.getElementById(`evenEditList-${dayIdx}`); const items = Array.from(container.children); if (idx < items.length) items[idx].remove(); reindexEditItems(dayIdx); }

    async function saveScheduleChanges() {
        const newDays = [];
        for (let i = 0; i < currentSchedule.length; i++) {
            const morningTextareas = document.querySelectorAll(`#mornEditList-${i} textarea`);
            const eveningTextareas = document.querySelectorAll(`#evenEditList-${i} textarea`);
            const morningTexts = Array.from(morningTextareas).map(ta => ta.value.trim()).filter(t => t);
            const eveningTexts = Array.from(eveningTextareas).map(ta => ta.value.trim()).filter(t => t);
            const oldDay = currentSchedule[i];
            if (currentSubject === 'physics') {
                newDays.push({ date: oldDay.date, weekday: oldDay.weekday, morning: morningTexts.join('\n'), evening: eveningTexts.join('\n') });
            } else {
                newDays.push({ dayNumber: oldDay.dayNumber, weekday: `اليوم ${oldDay.dayNumber}`, morning: morningTexts.join('\n'), evening: eveningTexts.join('\n') });
            }
        }
        let tempSubTasks = [];
        let idCounter = 0;
        newDays.forEach((day, dayIdx) => {
            splitSub(day.morning).forEach(text => { let duration = (currentSubject === 'science') ? extractDuration(text) : null; tempSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'صباحية', text, duration }); });
            splitSub(day.evening).forEach(text => { let duration = (currentSubject === 'science') ? extractDuration(text) : null; tempSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'مسائية', text, duration }); });
        });
        const taskTransferMap = new Map();
        for (let newTask of tempSubTasks) {
            const oldTask = allSubTasks.find(t => t.dayIndex === newTask.dayIndex && t.period === newTask.period && t.text === newTask.text);
            if (oldTask) taskTransferMap.set(newTask.id, oldTask.id);
        }
        if (currentSubject === 'physics') scheduleDataPhysics = newDays;
        else scheduleDataScience = newDays;
        currentSchedule = newDays;
        await saveScheduleToFirebase(currentSubject, newDays);
        const oldTaskIds = allSubTasks.map(t => t.id);
        const newTaskIds = tempSubTasks.map(t => t.id);
        const removedTaskIds = oldTaskIds.filter(id => !newTaskIds.includes(id));
        for (let id of removedTaskIds) await removeTaskFromAllStudents(id, currentSubject);
        const studentsSnap = await db.collection('students').get();
        const batch = db.batch();
        const field = currentSubject === 'physics' ? 'completedTasksPhysics' : 'completedTasksScience';
        for (const doc of studentsSnap.docs) {
            let completed = doc.data()[field] || [];
            let updated = false;
            for (let [newId, oldId] of taskTransferMap.entries()) {
                const entry = completed.find(e => e.taskId === oldId);
                if (entry) {
                    completed = completed.filter(e => e.taskId !== oldId);
                    completed.push({ taskId: newId, completedAt: entry.completedAt });
                    updated = true;
                }
            }
            if (updated) batch.update(doc.ref, { [field]: completed });
        }
        await batch.commit();
        await loadAllStudents();
        rebuildSubtaskIds();
        if (adminAuthenticated) await renderTeacherView();
        else if (currentStudent) renderStudentView();
       document.getElementById('editScheduleModal').classList.remove('active');
    showCustomModal("تم حفظ التعديلات بنجاح");
    playSound('success');
}

let audioContext = null;
function initAudio() {
    if (!audioContext) {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
            console.warn("Web Audio not supported", e);
            return false;
        }
    }
    if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume().catch(e => console.warn("resume failed", e));
    }
    return true;
}
function playSound(type) {
    try {
        if (!initAudio()) return;
        let frequency = 800, duration = 0.12, volume = 0.1;
        if (type === 'click') { frequency = 880; duration = 0.08; volume = 0.08; }
        else if (type === 'select') { frequency = 660; duration = 0.2; volume = 0.12; }
        else if (type === 'complete') { frequency = 1200; duration = 0.15; volume = 0.1; }
        else if (type === 'success') {
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.value = 1100;
            gain2.gain.value = volume;
            osc2.type = 'sine';
            osc2.start();
            gain2.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
            osc2.stop(audioContext.currentTime + duration);
            frequency = 880;
        }
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.value = frequency;
        gain.gain.value = volume;
        osc.type = 'sine';
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
        osc.stop(audioContext.currentTime + duration);
    } catch(e) { console.warn("playSound error", e); }
}
function playBeep() {
    try {
        if (!audioContext) {
            try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
            catch(e) { return; }
        }
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.15;
        osc.type = 'sine';
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
        osc.stop(audioContext.currentTime + 0.3);
        if (audioContext.state === 'suspended') audioContext.resume();
    } catch(e) { }
}

    document.querySelectorAll('button, .btn, .btn-icon, .detail-btn, .add-subtask-btn, .gender-option, .subject-card, #confirmSaveSchedule, #editScheduleBtnTeacher, #studentsListBtn, .filter-btn').forEach(btn => {
        if (btn.hasSound) return;
        btn.hasSound = true;
        btn.addEventListener('click', (e) => { e.stopPropagation(); playSound('click'); });
    });
}

    function playBeep() { try { if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = 880; gain.gain.value = 0.15; osc.type = 'sine'; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); osc.stop(audioCtx.currentTime + 0.3); if (audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) { } }

    function showToast(message, isError = false) { const toast = document.getElementById('toast-physics'); if (!toast) return; toast.textContent = message; toast.classList.remove('show', 'error'); if (isError) toast.classList.add('error'); void toast.offsetWidth; toast.classList.add('show'); clearTimeout(toast._timeout); toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 2400); }

    const canvas = document.getElementById('particles-canvas'); const ctx = canvas.getContext('2d'); let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function createParticles() { particles = []; for (let i = 0; i < 70; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 4 + 2, speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.3, color: `rgba(60,120,70,${Math.random() * 0.3 + 0.1})` }); }
    function drawParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let p of particles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); p.x += p.speedX; p.y += p.speedY; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; } requestAnimationFrame(drawParticles); }
    resizeCanvas(); createParticles(); drawParticles(); window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });

    let audioCtxPhysics = null;
    function initAudioPhysics() {
        if (!audioCtxPhysics) { try { audioCtxPhysics = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        if (audioCtxPhysics && audioCtxPhysics.state === 'suspended') audioCtxPhysics.resume();
    }
    function playClickSound() {
        try {
            initAudioPhysics();
            if (!audioCtxPhysics) return;
            const osc = audioCtxPhysics.createOscillator();
            const gain = audioCtxPhysics.createGain();
            osc.connect(gain);
            gain.connect(audioCtxPhysics.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.08;
            osc.type = 'sine';
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtxPhysics.currentTime + 0.15);
            osc.stop(audioCtxPhysics.currentTime + 0.15);
            if (audioCtxPhysics.state === 'suspended') audioCtxPhysics.resume();
        } catch(e) {}
    }
    document.addEventListener('click', function(e) {
        if (e.target.closest('.btn, .btn-icon, .detail-btn, .add-subtask-btn, #confirmSaveSchedule, #editScheduleBtnTeacher, #studentsListBtn, .subtask-check')) {

        }

// دالة إنشاء جسيمات عند النقر على زر الجنس
function createParticlesOnGender(e, element) {
    const rect = element.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const distance = 30 + Math.random() * 50;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        const particle = document.createElement('div');
        particle.className = 'particle-burst';
        particle.style.left = `${centerX - 4}px`;
        particle.style.top = `${centerY - 4}px`;
        particle.style.setProperty('--dx', `${dx}px`);
        particle.style.setProperty('--dy', `${dy}px`);
        // ألوان عشوائية جميلة
        const colors = ['#ffb74d', '#ff8a65', '#81c784', '#4fc3f7', '#ff80ab'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 600);
    }
}
