/* ===== حل مشكلة التمرير في الخلفية ===== */
body.no-scroll {
    overflow: hidden !important;
    position: fixed !important;
    width: 100% !important;
    height: 100% !important;
    top: 0 !important;
    left: 0 !important;
}

.modal.active {
    visibility: visible !important;
    opacity: 1 !important;
    overflow-y: auto !important;
}
/* ===== أنماط البادج حسب المادة ===== */
.duration-badge {
    padding: 4px 12px;
    border-radius: 40px;
    font-size: 0.75rem;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    font-weight: 600;
    direction: ltr !important;
    unicode-bidi: embed;
}

.duration-badge i {
    flex-shrink: 0;
}

.duration-badge span {
    display: inline-block;
    direction: ltr !important;
}
/* ===== تحسين الشيك بوكس (مع الحفاظ على البادجات) ===== */
.subtask-check {
    appearance: none;
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border: 2.5px solid #2b7a3e;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    position: relative;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(43, 122, 62, 0.1);
}

.subtask-check:hover {
    border-color: #1f5437;
    box-shadow: 0 4px 14px rgba(43, 122, 62, 0.2);
    transform: scale(1.08);
}

.subtask-check:checked {
    background: #2b7a3e;
    border-color: #2b7a3e;
    transform: scale(1.1);
    box-shadow: 0 4px 16px rgba(43, 122, 62, 0.35);
}

.subtask-check:checked::after {
    content: "✓";
    color: white;
    font-size: 17px;
    font-weight: 700;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    line-height: 1;
}

.subtask-check:active {

    function safeLocalStorageSet(key, value) { try { localStorage.setItem(key, value); return true; } catch(e) { return false; } }
    function safeLocalStorageGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
    async function safeFirebaseGet(docRef, timeoutMs = 5000) {
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('انتهى الوقت')), timeoutMs));
        const getPromise = docRef.get();
        return await Promise.race([getPromise, timeoutPromise]);
    }

    let allSubTasks = [];

    let allStudents = [];
    let adminAuthenticated = false;

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function extractDuration(text) {
    // للعلوم: البحث عن الأرقام بين {}
    let match = text.match(/\{(\d+(?:\.\d+)?)\}/);
    if (match) return parseFloat(match[1]);
    // للإسلامية: البحث عن الأرقام بين ()
    match = text.match(/\((\d+)\)/);
    if (match) return parseFloat(match[1]);
    return null;
}
    function cleanTaskText(rawText) {
    // إزالة الأرقام المحجوزة بين {} (للعلوم)
    let cleaned = rawText.replace(/\s*\{[\d\.]+\}\s*$/, '').trim();
    // إزالة الأرقام المحجوزة بين () (للإسلامية)
    cleaned = cleaned.replace(/\s*\([\d]+\)\s*$/, '').trim();
    return cleaned;
}
    function splitSub(text) {
        if (!text) return [];
        const lines = text.split(/\n/);
        const tasks = [];
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;
            if (line.includes('/')) {
                const parts = line.split(/\s*\/\s*/);
                for (let part of parts) if (part.trim()) tasks.push(part.trim());
            } else {
                tasks.push(line);
            }
        }
        return tasks;
    }

    // ========== الساعات ==========
    // حساب إجمالي ساعات الخطة
function getTotalHoursOfPlan() {
    return allSubTasks.reduce((sum, task) => sum + (task.duration || 0), 0);
}

function getCompletedHoursForStudent(student) {
    const completedEntries = getStudentCompletedBySubject(student, currentSubject);
    let total = 0;
    for (const entry of completedEntries) {
        // البحث عن المهمة باستخدام taskId أو المعلومات الإضافية
        let task = allSubTasks.find(t => t.id === entry.taskId);
        if (!task && entry.dayIndex !== undefined && entry.period && entry.text) {
            task = allSubTasks.find(t => 
                t.dayIndex === entry.dayIndex && 
                t.period === entry.period && 
                t.text === entry.text
            );
        }
        if (task && task.duration) {
            total += task.duration;
        }
    }
    return total;
}

                let match = taskText.match(/\{(\d+(?:\.\d+)?)\}/);

                unit = 'ساعة';

                let match = taskText.match(/\((\d+)\)/);
                duration = match ? parseFloat(match[1]) : 0;
                unit = 'درس';
            } else if (currentSubject === 'physics') {
                duration = 1;
                unit = '';
            }
            allSubTasks.push({ 
                id: `task_${idCounter++}`, 
                dayIndex: dayIdx, 
                period: 'صباحية', 
                text: taskText, 
                duration: duration,
                unit: unit
            });
        });
        
        let eveningTasks = splitSub(day.evening);

    async function loadScheduleFromFirebase(subject) {
        const docRef = db.collection('config').doc(`schedule_${subject}`);
        let doc;
        try { doc = await safeFirebaseGet(docRef); } catch(e) { throw new Error(`فشل تحميل جدول ${subject}`); }
        if (doc.exists) {
            if (subject === 'physics') scheduleDataPhysics = doc.data().days;
            else if (subject === 'science') scheduleDataScience = doc.data().days;
            else scheduleDataIslamic = doc.data().days;
        } else {
            if (subject === 'physics') await docRef.set({ days: scheduleDataPhysics });
            else if (subject === 'science') await docRef.set({ days: scheduleDataScience });
            else await docRef.set({ days: scheduleDataIslamic });
        }
    }
    async function saveScheduleToFirebase(subject, data) { await db.collection('config').doc(`schedule_${subject}`).set({ days: data }); }
    function formatTimeAndDate(timestampMs) {
        if (!timestampMs) return '—';
        const date = new Date(timestampMs);
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'م' : 'ص';
        hours = hours % 12; if (hours === 0) hours = 12;
        return `${hours}:${minutes} ${ampm} - ${date.getDate()}/${date.getMonth()+1}`;
    }
    async function removeTaskFromAllStudents(taskId, subject) {
        const studentsSnap = await db.collection('students').get();
        const batch = db.batch();
        const field = subject === 'physics' ? 'completedTasksPhysics' : (subject === 'science' ? 'completedTasksScience' : 'completedTasksIslamic');
        studentsSnap.docs.forEach(doc => {
            const completed = doc.data()[field] || [];
            const newCompleted = completed.filter(entry => entry.taskId !== taskId);
            if (newCompleted.length !== completed.length) batch.update(doc.ref, { [field]: newCompleted });
        });
        await batch.commit();
    }
    async function registerStudent(fullName, gender) {
        const newId = db.collection('students').doc().id;
        const studentData = { fullName, gender, completedTasksPhysics: [], completedTasksScience: [], completedTasksIslamic: [], createdAt: firebase.firestore.FieldValue.serverTimestamp(), lastUpdated: firebase.firestore.FieldValue.serverTimestamp() };
        await db.collection('students').doc(newId).set(studentData);

        safeLocalStorageSet('studentId', newId);

    function renderStudentView() {

function attachTaskCheckEvents() {
    // ربط حدث التغيير بكل مربعات الاختيار
    document.querySelectorAll('.subtask-check').forEach(cb => {
        // إزالة المستمع القديم لتجنب التكرار
        cb.removeEventListener('change', handleTaskToggle);
        cb.addEventListener('change', handleTaskToggle);
    });
}

    async function handleTaskToggle(e) {
    const cb = e.target;
    const taskId = cb.getAttribute('data-id');
    if (!currentStudent) return;
    
    let completed = getStudentCompletedBySubject(currentStudent, currentSubject);
    const task = allSubTasks.find(t => t.id === taskId);
    
    if (cb.checked) {
        playSound('complete');
        // ✅ حفظ معلومات إضافية لتسهيل الاسترجاع
        completed.push({ 
            taskId, 
            completedAt: Date.now(),
            dayIndex: task?.dayIndex,
            period: task?.period,
            text: task?.text,
            duration: task?.duration
        });
    } else {
        completed = completed.filter(entry => entry.taskId !== taskId);
    }
    
    await saveStudentProgress(currentStudent.id, completed, currentSubject);
    const field = currentSubject === 'physics' ? 'completedTasksPhysics' : 
                  (currentSubject === 'science' ? 'completedTasksScience' : 'completedTasksIslamic');
    currentStudent[field] = completed;
    celebrationTriggered = false;
    renderStudentView();
    playBeep();
}
    async function switchSubject(subject) {
    if (subject === currentSubject) return;
    
    playSound('select');
    celebrationTriggered = false;
    
    // ✅ تنظيف البيانات القديمة
    allSubTasks = [];
    currentSchedule = [];
    currentSubject = subject;
    
    if (subject === 'physics') { 
        await loadScheduleFromFirebase('physics'); 
        currentSchedule = scheduleDataPhysics; 
    }
    else if (subject === 'science') { 
        await loadScheduleFromFirebase('science'); 
        currentSchedule = scheduleDataScience; 
    }
    else { 
        await loadScheduleFromFirebase('islamic'); 
        currentSchedule = scheduleDataIslamic; 
    }
    
    rebuildSubtaskIds();
    buildStudentUI();
    renderStudentView();
    
    const names = { physics: 'الفيزياء', science: 'العلوم', islamic: 'التربية الإسلامية' };
    showToast(`تم التبديل إلى مادة ${names[subject]}`);
}

    async function showTaskDetails(taskId) {
        const task = allSubTasks.find(t => t.id === taskId);
        if (!task) return;
        await loadAllStudents();
        const completedStudents = allStudents.filter(s => {
            const completed = getStudentCompletedBySubject(s, currentSubject);
            return completed.some(entry => entry.taskId === taskId);

// ========== عرض مهام الطالب المكتملة ==========
async function showStudentTasks(studentId) {
    // إزالة أي مودال موجود مسبقاً
    const existingModal = document.getElementById('studentTasksModal');
    if (existingModal) existingModal.classList.remove('active');
    
    // البحث عن الطالب
    const student = allStudents.find(s => s.id === studentId);
    if (!student) {
        console.warn("الطالب غير موجود:", studentId);
        return;
    }
    
    // جلب المهام المكتملة للطالب في المادة الحالية
    const completedEntries = getStudentCompletedBySubject(student, currentSubject);
    const completedTasksList = [];
    
    // معالجة كل مهمة مكتملة
    for (const entry of completedEntries) {
        let task = null;
        
        // 1️⃣ المحاولة الأولى: البحث باستخدام taskId
        task = allSubTasks.find(t => t.id === entry.taskId);
        
        // 2️⃣ المحاولة الثانية: البحث باستخدام المعلومات الإضافية (dayIndex, period, text)
        if (!task && entry.dayIndex !== undefined && entry.period && entry.text) {
            task = allSubTasks.find(t => 
                t.dayIndex === entry.dayIndex && 
                t.period === entry.period && 
                t.text === entry.text
            );
        }
        
        // 3️⃣ المحاولة الثالثة: البحث باستخدام النص فقط (كحل أخير)
        if (!task && entry.text) {
            task = allSubTasks.find(t => t.text === entry.text);
        }
        
        // إذا لم يتم العثور على المهمة، تخطيها
        if (!task) continue;
        
        // استخراج تاريخ المهمة
        const day = currentSchedule[task.dayIndex];
        let dateStr = '?';
        if (day) {
            if (currentSubject === 'physics') {
                dateStr = day.date || '?';
            } else {
                dateStr = `اليوم ${day.dayNumber}`;
            }
        }
        
        // إضافة المهمة إلى القائمة
        completedTasksList.push({ 
            text: task.text, 
            completedAt: entry.completedAt, 
            date: dateStr, 
            duration: task.duration,
            unit: task.unit || ''
        });
    }
    
    // حساب النسبة المئوية للمهام المكتملة
    const taskPercent = allSubTasks.length === 0 ? 0 : ((completedTasksList.length / allSubTasks.length) * 100).toFixed(1);
    
    // حساب الوحدات المكتملة (ساعات/دقائق) للعلوم والإسلامية
    let totalUnits = 0;
    let completedUnits = 0;
    let unitLabel = '';
    let unitsPercent = 0;
    
    if (currentSubject === 'science') {
        totalUnits = getTotalHoursOfPlan();
        completedUnits = getCompletedHoursForStudent(student);
        unitLabel = 'ساعة';
        unitsPercent = totalUnits === 0 ? 0 : ((completedUnits / totalUnits) * 100).toFixed(1);
    } else if (currentSubject === 'islamic') {
        totalUnits = getTotalHoursOfPlan();
        completedUnits = getCompletedHoursForStudent(student);
        unitLabel = 'ساعة';
        unitsPercent = totalUnits === 0 ? 0 : ((completedUnits / totalUnits) * 100).toFixed(1);
    }
    
    // تحديث عنوان المودال
    const titleEl = document.getElementById('studentTasksTitle');
    if (titleEl) {
        let statsHTML = `
            <div style="text-align:center;">
                <div style="font-size:1.3rem; margin-bottom:10px; color:#1f5437;">
                    <i class="fas fa-user-graduate"></i> ${escapeHtml(student.fullName)}
                </div>
                <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap; font-size:0.9rem;">
                    <span style="background:#e8f5e9; padding:6px 16px; border-radius:20px; display:inline-flex; align-items:center; gap:6px;">
                        <i class="fas fa-tasks" style="color:#2c6e3c;"></i>
                        المهام: ${completedTasksList.length}/${allSubTasks.length} (${taskPercent}%)
                    </span>
        `;
        
        // إضافة معلومات الوحدات للعلوم والإسلامية
        if (currentSubject === 'science' || currentSubject === 'islamic') {
            statsHTML += `
                <span style="background:#e3f2fd; padding:6px 16px; border-radius:20px; display:inline-flex; align-items:center; gap:6px;">
                    <i class="fas fa-clock" style="color:#1565c0;"></i>
                    ${unitLabel}: ${completedUnits.toFixed(1)}/${totalUnits.toFixed(1)} (${unitsPercent}%)
                </span>
            `;
        }
        
        statsHTML += `
                </div>
            </div>
        `;
        
        titleEl.innerHTML = statsHTML;
    }
    
    // عرض قائمة المهام المكتملة
    const container = document.getElementById('studentTasksList');
    if (container) {
        if (completedTasksList.length === 0) {
            container.innerHTML = `
                <div class="student-task-card" style="justify-content:center; color:#888;">
                    <i class="fas fa-info-circle" style="font-size:1.5rem; color:#f39c12;"></i>
                    <span>لم يكمل الطالب أي مهام بعد في هذه المادة</span>
                </div>
            `;
        } else {
            // ترتيب المهام حسب تاريخ الإكمال (الأحدث أولاً)
            completedTasksList.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));
            
            container.innerHTML = completedTasksList.map((task, index) => {
                const timeDateStr = formatTimeAndDate(task.completedAt);
                
                // عرض مدة المهمة للعلوم والإسلامية
                let durationHtml = '';
                if ((currentSubject === 'science' || currentSubject === 'islamic') && task.duration > 0) {
                    const badgeColor = currentSubject === 'islamic' ? '#F59E0B' : '#2196f3';
                    const iconClass = currentSubject === 'islamic' ? 'fa-book-open' : 'fa-clock';
                    
                    let numberPart = '';
                    let textPart = '';
                    
                    if (currentSubject === 'islamic') {
                        if (task.duration === 1) {
                            numberPart = '1';
                            textPart = 'ساعة';
                        } else if (task.duration === 2) {
                            numberPart = '';
                            textPart = 'ساعتين';
                        } else {
                            numberPart = task.duration;
                            textPart = 'ساعات';
                        }
                    } else if (currentSubject === 'science') {
                        if (task.duration === 1) {
                            numberPart = '1';
                            textPart = 'ساعة';
                        } else if (task.duration === 2) {
                            numberPart = '';
                            textPart = 'ساعتين';
                        } else {
                            numberPart = task.duration;
                            textPart = 'ساعات';
                        }
                    }
                    
                    durationHtml = `
                        <span class="duration-badge" style="background:${badgeColor}; color:white; direction:ltr; display:inline-flex; align-items:center; gap:3px; padding:3px 10px; border-radius:40px; font-size:0.7rem; white-space:nowrap; font-weight:600;">
                            <i class="fas ${iconClass}" style="flex-shrink:0;"></i>
                            ${numberPart ? `<span style="display:inline-block; direction:ltr;">${numberPart}</span>` : ''}
                            <span style="display:inline-block; direction:ltr;">${textPart}</span>
                        </span>
                    `;
                }
                
                // رقم المهمة
                const taskNumber = index + 1;
                
                return `
                    <div class="student-task-card">
                        <span style="background:#2c6e3c; color:white; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:bold; flex-shrink:0;">
                            ${taskNumber}
                        </span>
                        <div style="flex:1; min-width:0;">
                            <div style="font-weight:bold; font-size:1rem; color:#1f3b2c;">${escapeHtml(cleanTaskText(task.text))}</div>
                            <div style="font-size:0.75rem; color:#4a6741; margin-top:2px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                                <span><i class="far fa-calendar-alt" style="color:#888;"></i> ${task.date || '?'}</span>
                                <span><i class="far fa-clock" style="color:#888;"></i> ${timeDateStr}</span>
                            </div>
                        </div>
                        ${durationHtml}
                    </div>
                `;
            }).join('');
        }
    }
    
    // إظهار المودال
    const modal = document.getElementById('studentTasksModal');
    if (modal) {
        modal.style.visibility = 'visible';
        modal.style.opacity = '1';
        modal.classList.add('active');
        modal.style.zIndex = '3001';
    }
    
    // تشغيل صوت
    playSound('select');
}

    function attachEditEvents() {
        document.querySelectorAll('.delete-subtask').forEach(btn => { btn.removeEventListener('click', handleDelete); btn.addEventListener('click', handleDelete); });
        document.querySelectorAll('.add-subtask-btn').forEach(btn => { btn.removeEventListener('click', handleAdd); btn.addEventListener('click', handleAdd); });
    }
    async function handleDelete(e) { const btn=e.currentTarget; const dayIdx=parseInt(btn.dataset.day); const period=btn.dataset.period; const idx=parseInt(btn.dataset.idx); const container = period==='morning'?document.getElementById(`mornEditList-${dayIdx}`):document.getElementById(`evenEditList-${dayIdx}`); const items=Array.from(container.children); if(idx<items.length) items[idx].remove(); reindexEditItems(dayIdx); }
    function handleAdd(e) { const btn=e.currentTarget; const dayIdx=parseInt(btn.dataset.day); const period=btn.dataset.period; const container = period==='morning'?document.getElementById(`mornEditList-${dayIdx}`):document.getElementById(`evenEditList-${dayIdx}`); const newIdx=container.children.length; const taskDiv=document.createElement('div'); taskDiv.className='subtask-edit-item'; taskDiv.innerHTML = `<textarea rows="2" style="flex:1;" data-day="${dayIdx}" data-period="${period}" data-idx="${newIdx}">مهمة جديدة</textarea><button class="delete-subtask" data-day="${dayIdx}" data-period="${period}" data-idx="${newIdx}"><i class="fas fa-trash-alt"></i></button>`; container.appendChild(taskDiv); attachEditEvents(); reindexEditItems(dayIdx); }
    function reindexEditItems(dayIdx) { document.querySelectorAll(`#mornEditList-${dayIdx} textarea, #evenEditList-${dayIdx} textarea`).forEach((inp,newIdx)=>{ inp.setAttribute('data-idx',newIdx); }); document.querySelectorAll(`#mornEditList-${dayIdx} .delete-subtask, #evenEditList-${dayIdx} .delete-subtask`).forEach((delBtn,newIdx)=>{ delBtn.setAttribute('data-idx',newIdx); }); }
    async function saveScheduleChanges() {
        const newDays = [];
        for (let i=0; i<currentSchedule.length; i++) {
            const morningTextareas = document.querySelectorAll(`#mornEditList-${i} textarea`);
            const eveningTextareas = document.querySelectorAll(`#evenEditList-${i} textarea`);
            const morningTexts = Array.from(morningTextareas).map(ta=>ta.value.trim()).filter(t=>t);
            const eveningTexts = Array.from(eveningTextareas).map(ta=>ta.value.trim()).filter(t=>t);
            const oldDay = currentSchedule[i];
            if (currentSubject==='physics') newDays.push({ date: oldDay.date, weekday: oldDay.weekday, morning: morningTexts.join('\n'), evening: eveningTexts.join('\n') });
            else newDays.push({ dayNumber: oldDay.dayNumber, weekday: `اليوم ${oldDay.dayNumber}`, morning: morningTexts.join('\n'), evening: eveningTexts.join('\n') });
        }
        let tempSubTasks = []; let idCounter=0;
        newDays.forEach((day,dayIdx)=>{
            splitSub(day.morning).forEach(text=>{ let duration=(currentSubject==='science'||currentSubject==='islamic')?extractDuration(text):1; tempSubTasks.push({ id:`task_${idCounter++}`, dayIndex:dayIdx, period:'صباحية', text, duration }); });
            splitSub(day.evening).forEach(text=>{ let duration=(currentSubject==='science'||currentSubject==='islamic')?extractDuration(text):1; tempSubTasks.push({ id:`task_${idCounter++}`, dayIndex:dayIdx, period:'مسائية', text, duration }); });
        });
        const taskTransferMap = new Map();
        for (let newTask of tempSubTasks) {
            const oldTask = allSubTasks.find(t=>t.dayIndex===newTask.dayIndex && t.period===newTask.period && t.text===newTask.text);
            if (oldTask) taskTransferMap.set(newTask.id, oldTask.id);
        }
        if (currentSubject==='physics') scheduleDataPhysics = newDays;
        else if (currentSubject==='science') scheduleDataScience = newDays;
        else scheduleDataIslamic = newDays;
        currentSchedule = newDays;
        await saveScheduleToFirebase(currentSubject, newDays);
        const oldTaskIds = allSubTasks.map(t=>t.id);
        const newTaskIds = tempSubTasks.map(t=>t.id);
        const removedTaskIds = oldTaskIds.filter(id=>!newTaskIds.includes(id));
        for (let id of removedTaskIds) await removeTaskFromAllStudents(id, currentSubject);
        const studentsSnap = await db.collection('students').get();
        const batch = db.batch();
        const field = currentSubject==='physics'?'completedTasksPhysics':(currentSubject==='science'?'completedTasksScience':'completedTasksIslamic');
        for (const doc of studentsSnap.docs) {
            let completed = doc.data()[field] || [];
            let updated = false;
            for (let [newId, oldId] of taskTransferMap.entries()) {
                const entry = completed.find(e=>e.taskId===oldId);
                if (entry) {
                    completed = completed.filter(e=>e.taskId!==oldId);
                    completed.push({ taskId: newId, completedAt: entry.completedAt });
                    updated = true;
                }
            }
            if (updated) batch.update(doc.ref, { [field]: completed });
        }
        await batch.commit();
        await loadAllStudents();
        rebuildSubtaskIds();
        if (adminAuthenticated) await renderTeacherView();
        else if (currentStudent) renderStudentView();
        document.getElementById('editScheduleModal').classList.remove('active');
        showCustomModal("تم حفظ التعديلات بنجاح");
        playSound('success');
    }

    function playSound(type) { try { if(!initAudio()) return; let freq=800,dur=0.12,vol=0.1; if(type==='click'){freq=880;dur=0.08;vol=0.08;}else if(type==='select'){freq=660;dur=0.2;vol=0.12;}else if(type==='complete'){freq=1200;dur=0.15;vol=0.1;}else if(type==='success'){ const osc2=audioContext.createOscillator(); const gain2=audioContext.createGain(); osc2.connect(gain2); gain2.connect(audioContext.destination); osc2.frequency.value=1100; gain2.gain.value=vol; osc2.type='sine'; osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.0001,audioContext.currentTime+dur); osc2.stop(audioContext.currentTime+dur); return; } const osc=audioContext.createOscillator(); const gain=audioContext.createGain(); osc.connect(gain); gain.connect(audioContext.destination); osc.frequency.value=freq; gain.gain.value=vol; osc.type='sine'; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001,audioContext.currentTime+dur); osc.stop(audioContext.currentTime+dur); } catch(e){} }

    // ===== صورة التصفيق (Clap Sound) =====
    function playClapSound() {
        try {
            if (!audioContext) initAudio();
            if (!audioContext) return;
            const duration = 1.8;
            const bufferSize = audioContext.sampleRate * duration;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            // توليد ضوضاء بيضاء مع نبضات تشبه التصفيق
            for (let i = 0; i < bufferSize; i++) {
                const t = i / audioContext.sampleRate;
                // محاكاة التصفيق: دفعات عشوائية متقطعة
                const envelope = Math.sin(t * 30) * 0.5 + 0.5; // موجات سريعة
                const burst = Math.random() > 0.6 ? 1 : 0.3; // كثافة عشوائية
                data[i] = (Math.random() * 2 - 1) * envelope * burst * 0.15;
            }
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            source.connect(gain);
            gain.connect(audioContext.destination);
            source.start();
            source.stop(audioContext.currentTime + duration);
        } catch(e) { console.warn('Clap error:', e); }
    }

                <div class="subject-card" data-subject="islamic" style="background:linear-gradient(145deg, #1a3a6b, #0d2547); border-radius:2rem; padding:2rem; width:260px; text-align:center; cursor:pointer; color:white;"><i class="fas fa-mosque" style="font-size:4rem;"></i><h2>الاسلامية</h2><p>خطة مكثفة 4 أيام</p></div>
            </div>
        `;
        document.querySelectorAll('.subject-card').forEach(card=>{
            card.addEventListener('click', async ()=>{
                playSound('select');
                const subject = card.dataset.subject;
                await initializeStudentWithSubject(subject);
            });
        });
    }
    function createParticlesOnGender(e, element) {
        const rect = element.getBoundingClientRect();
        const centerX = rect.left+rect.width/2; const centerY = rect.top+rect.height/2;
        for(let i=0;i<12;i++) {
            const angle = Math.random()*Math.PI*2;
            const distance = 30+Math.random()*50;
            const dx = Math.cos(angle)*distance; const dy = Math.sin(angle)*distance;
            const particle = document.createElement('div'); particle.className='particle-burst';
            particle.style.left = `${centerX-4}px`; particle.style.top = `${centerY-4}px`;
            particle.style.setProperty('--dx', `${dx}px`); particle.style.setProperty('--dy', `${dy}px`);
            particle.style.background = ['#ffb74d','#ff8a65','#81c784','#4fc3f7','#ff80ab'][Math.floor(Math.random()*5)];
            document.body.appendChild(particle);
            setTimeout(()=>particle.remove(),600);
        }
    }
    addModals();
    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
                modal.style.visibility = 'hidden';
                modal.style.opacity = '0';
            }
        });
    });
    document.getElementById('closeStudentTasksModal')?.addEventListener('click', function() {
        const modal = document.getElementById('studentTasksModal');
        if (modal) {
            modal.classList.remove('active');
            modal.style.visibility = 'hidden';
            modal.style.opacity = '0';
        }
    });
    initApp();
    document.body.addEventListener('click', function once() { initAudio(); document.body.removeEventListener('click', once); }, { once: true });
</script>
</body>
</html>
