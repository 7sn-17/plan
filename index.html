    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    function splitSub(text) { if (!text) return []; let temp = text.replace(/\.{2,}/g, '||DOTDOT||'); let parts = temp.split(/(?:[\/،]| و | \/ |\, |\- )/); parts = parts.map(p => p.trim()).filter(p => p.length > 0); parts = parts.map(p => p.replace(/\|\|DOTDOT\|\|/g, '..')); if (parts.length === 1 && text.length > 0) return [text]; let merged = []; for (let i = 0; i < parts.length; i++) { let curr = parts[i]; if (curr.match(/\d{2,}/) && curr.includes('..') && i + 1 < parts.length && parts[i + 1].match(/\d{2,}/)) { curr += ' .. ' + parts[i + 1]; i++; } merged.push(curr); } return merged; }
    function rebuildSubtaskIds() { allSubTasks = []; let idCounter = 0; scheduleData.forEach((day, dayIdx) => { splitSub(day.morning).forEach(text => { allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'صباحية', text }); }); splitSub(day.evening).forEach(text => { allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'مسائية', text }); }); }); }
    async function loadScheduleFromFirebase() { const docRef = db.collection('config').doc('schedule'); const doc = await docRef.get(); if (doc.exists) { scheduleData = doc.data().days; } else { await docRef.set({ days: scheduleData }); } rebuildSubtaskIds(); }
    async function saveScheduleToFirebase() { await db.collection('config').doc('schedule').set({ days: scheduleData }); rebuildSubtaskIds(); }
    async function removeTaskFromAllStudents(taskId) { const studentsSnap = await db.collection('students').get(); const batch = db.batch(); studentsSnap.docs.forEach(doc => { const completed = doc.data().completedTasks || []; if (completed.includes(taskId)) { batch.update(doc.ref, { completedTasks: completed.filter(id => id !== taskId) }); } }); await batch.commit(); }
    async function registerStudent(fullName, gender) { const newId = db.collection('students').doc().id; const studentData = { fullName, gender, completedTasks: [], createdAt: firebase.firestore.FieldValue.serverTimestamp(), lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }; await db.collection('students').doc(newId).set(studentData); currentStudent = { id: newId, ...studentData }; localStorage.setItem('studentId', newId); return currentStudent; }
    async function loadStudentData(studentId) { const doc = await db.collection('students').doc(studentId).get(); if (doc.exists) { currentStudent = { id: studentId, ...doc.data() }; } else { currentStudent = null; } }
    async function saveStudentProgress(studentId, completedTasksArray) { await db.collection('students').doc(studentId).update({ completedTasks: completedTasksArray, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }); }
    async function loadAllStudents() { const snapshot = await db.collection('students').get(); allStudents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })); }

    // إحصائيات المهمة مع تصحيح النسب والكسر

    // عرض مهام الطالب بشكل محسن

        const completedIds = new Set(student.completedTasks || []);
        const completedTasksList = allSubTasks.filter(t => completedIds.has(t.id)).map(t => ({

                </div>
            `).join('');
        }
        const modal = document.getElementById('studentTasksModal');
        modal.style.zIndex = '2000';
        modal.classList.add('active');
    }

    }
    async function handleDelete(e) { const btn = e.currentTarget; const dayIdx = parseInt(btn.dataset.day); const period = btn.dataset.period; const idx = parseInt(btn.dataset.idx); const container = period === 'morning' ? document.getElementById(`mornEditList-${dayIdx}`) : document.getElementById(`evenEditList-${dayIdx}`); const items = Array.from(container.children); if (idx < items.length) items[idx].remove(); reindexEditItems(dayIdx); }
    function handleAdd(e) { const btn = e.currentTarget; const dayIdx = parseInt(btn.dataset.day); const period = btn.dataset.period; const container = period === 'morning' ? document.getElementById(`mornEditList-${dayIdx}`) : document.getElementById(`evenEditList-${dayIdx}`); const newIdx = container.children.length; const taskDiv = document.createElement('div'); taskDiv.className = 'subtask-edit-item'; taskDiv.innerHTML = `<input type="text" value="مهمة جديدة" data-day="${dayIdx}" data-period="${period}" data-idx="${newIdx}"><button class="delete-subtask" data-day="${dayIdx}" data-period="${period}" data-idx="${newIdx}"><i class="fas fa-trash-alt"></i></button>`; container.appendChild(taskDiv); attachEditEvents(); reindexEditItems(dayIdx); }
    function reindexEditItems(dayIdx) { document.querySelectorAll(`#mornEditList-${dayIdx} input, #evenEditList-${dayIdx} input`).forEach((inp, newIdx) => { inp.setAttribute('data-idx', newIdx); }); document.querySelectorAll(`#mornEditList-${dayIdx} .delete-subtask, #evenEditList-${dayIdx} .delete-subtask`).forEach((delBtn, newIdx) => { delBtn.setAttribute('data-idx', newIdx); }); }

    async function saveScheduleChanges() {
    const newDays = [];
    for (let i = 0; i < scheduleData.length; i++) {
        const morningInputs = document.querySelectorAll(`#mornEditList-${i} input`);
        const eveningInputs = document.querySelectorAll(`#evenEditList-${i} input`);
        const morningTexts = Array.from(morningInputs).map(inp => inp.value.trim()).filter(t => t);
        const eveningTexts = Array.from(eveningInputs).map(inp => inp.value.trim()).filter(t => t);
        newDays.push({ date: scheduleData[i].date, weekday: scheduleData[i].weekday, morning: morningTexts.join(' / '), evening: eveningTexts.join(' / ') });
    }
    
    let tempSubTasks = []; 
    let idCounter = 0;
    newDays.forEach((day, dayIdx) => { 
        splitSub(day.morning).forEach(text => { tempSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'صباحية', text }); }); 
        splitSub(day.evening).forEach(text => { tempSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'مسائية', text }); }); 
    });
    
    const oldSet = new Set(allSubTasks.map(t => t.id)); 
    const newSet = new Set(tempSubTasks.map(t => t.id));
    const removedTasks = allSubTasks.filter(t => !newSet.has(t.id));
    const changedTasks = [];
    for (let newTask of tempSubTasks) { 
        const oldTask = allSubTasks.find(t => t.id === newTask.id); 
        if (oldTask && oldTask.text !== newTask.text) changedTasks.push({ oldId: oldTask.id, newTask }); 
    }
    
    scheduleData = newDays;
    await saveScheduleToFirebase();
    for (let task of removedTasks) await removeTaskFromAllStudents(task.id);
    for (let change of changedTasks) {
        await removeTaskFromAllStudents(change.oldId);
        const studentsSnap = await db.collection('students').get(); 
        const batch = db.batch();
        studentsSnap.docs.forEach(doc => { 
            const completed = doc.data().completedTasks || []; 
            if (completed.includes(change.oldId)) { 
                const newCompleted = completed.filter(id => id !== change.oldId); 
                newCompleted.push(change.newTask.id); 
                batch.update(doc.ref, { completedTasks: newCompleted }); 
            } 
        });
        await batch.commit();
    }
    
    await loadAllStudents();
    if (adminAuthenticated) await renderTeacherView(); 
    else if (currentStudent) renderStudentView();
    
    document.getElementById('editScheduleModal').classList.remove('active');
    showCustomModal("تم حفظ التغييرات بنجاح");
}

    let audioCtx = null;
    function playBeep() { try { if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = 880; gain.gain.value = 0.15; osc.type = 'sine'; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); osc.stop(audioCtx.currentTime + 0.3); if (audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) { } }
    function showCustomModal(message) { const modal = document.getElementById('customMessageModal'); document.getElementById('customMessageText').innerText = message; modal.classList.add('active'); setTimeout(() => modal.classList.remove('active'), 2000); }

    // جسيمات الخلفية
    const canvas = document.getElementById('particles-canvas'); const ctx = canvas.getContext('2d'); let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function createParticles() { particles = []; for (let i = 0; i < 70; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 4 + 2, speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.3, color: `rgba(60,120,70,${Math.random() * 0.3 + 0.1})` }); }
    function drawParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let p of particles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); p.x += p.speedX; p.y += p.speedY; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; } requestAnimationFrame(drawParticles); }
    resizeCanvas(); createParticles(); drawParticles(); window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });

    async function initApp() {
        await loadScheduleFromFirebase();
        const urlParams = new URLSearchParams(window.location.search);
        const isTeacherRequest = urlParams.get('teacher') === 'true';
        if (isTeacherRequest) {
            adminAuthenticated = true;
            document.getElementById('appContainer').innerHTML = `
                <div class="hero-area">
                    <div class="logo-title"><h1><i class="fas fa-chalkboard-user"></i> لوحة تحكم المشرف - فيزياء 2026</h1></div>
                    <div class="admin-buttons">
                        <button id="studentsListBtn" class="btn-icon"><i class="fas fa-users"></i> الطلاب</button>
                        <button id="editScheduleBtnTeacher" class="btn-icon"><i class="fas fa-edit"></i> تعديل الخطة</button>
                    </div>
                </div>
                <div class="info-note"><i class="fas fa-info-circle"></i> اضغط على الكسر (مثل 📊 7/20) لعرض تفاصيل المهمة والطلاب المنجزين.</div>
                <div class="today-highlight" id="todaySpotlight"><div style="font-weight:800;"><i class="fas fa-calendar-day"></i> مهام اليوم</div><div id="todayTasksList"></div></div>
                <div id="allDaysContainer"></div>
                <div class="motivational-board">✨ متابعة تقدم الطلاب بشكل لحظي ✨</div>
                <div class="footer-quote">🌟 أ.أحمد العمر 🌟<br>قد نتعب نعم لكننا اصحاب هدف</div>
                <div class="developer-credit">المطور: حسن المحمد</div>
            `;
            await renderTeacherView();
            document.getElementById('editScheduleBtnTeacher').addEventListener('click', openEditSchedule);
            document.getElementById('studentsListBtn').addEventListener('click', showAllStudentsDialog);
        } else {
            const storedId = localStorage.getItem('studentId');
            if (storedId) { await loadStudentData(storedId); if (currentStudent) { buildStudentUI(); renderStudentView(); return; } }
            const overlay = document.createElement('div');
            overlay.className = 'student-login-overlay';
            overlay.innerHTML = `
                <div class="student-login-card">
                    <i class="fas fa-user-graduate"></i>
                    <h2>مرحباً! أدخل بياناتك</h2>
                    <input type="text" id="studentFullName" placeholder="الاسم الثلاثي (ثلاث كلمات)">
                    <div style="margin: 10px 0;">
                        <label style="font-weight: bold;">الجنس:</label>
                        <div class="gender-select">
                            <div class="gender-option" data-gender="ذكر">♂ ذكر</div>
                            <div class="gender-option" data-gender="أنثى">♀ أنثى</div>
                        </div>
                        <input type="hidden" id="studentGender" value="ذكر">
                    </div>
                    <div class="error-message" id="nameError">⚠️ يجب إدخال الاسم الثلاثي (ثلاث كلمات مفصولة بمسافات)</div>
                    <button id="submitStudentData">بدء المتابعة</button>
                </div>
            `;
            document.body.appendChild(overlay);
            const genderOptions = overlay.querySelectorAll('.gender-option');
            const genderInput = document.getElementById('studentGender');
            genderOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    genderOptions.forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    genderInput.value = opt.getAttribute('data-gender');
                });
            });
            genderOptions[0].classList.add('selected');
            document.getElementById('submitStudentData').addEventListener('click', async () => {
                const name = document.getElementById('studentFullName').value.trim();
                const gender = document.getElementById('studentGender').value;
                if (name.split(/\s+/).length < 3) {
                    document.getElementById('nameError').style.display = 'block';
                    return;
                }
                document.getElementById('nameError').style.display = 'none';
                await registerStudent(name, gender);
                overlay.remove();
                buildStudentUI();
                renderStudentView();
            });
        }
    }

    function buildStudentUI() {
    document.getElementById('appContainer').innerHTML = `
        <div class="hero-area"><div class="logo-title"><h1><i class="fas fa-seedling"></i> 📘 الخطة الامتحانية فيزياء <i class="fas fa-flask"></i></h1></div></div>
        <div class="stats-panel"><div><i class="fas fa-chart-line"></i> الإنجاز الكلي: <strong id="globalDone">0</strong> / <strong id="globalTotal">0</strong></div><div class="progress-bg"><div class="progress-fill-global" id="globalProgressFill"></div></div></div>

        <div class="footer-quote">🌟 أ.أحمد العمر 🌟<br>قد نتعب نعم لكننا اصحاب هدف</div>

}

    function addModals() {
        const modalHTML = `
            <div id="taskStatsModal" class="modal"><div class="modal-content"><h3 id="taskStatTitle" style="color:#1f5437;"></h3><div class="filter-buttons"><button id="filterAllModal" class="filter-btn active">الكل</button><button id="filterMaleModal" class="filter-btn">♂ ذكور</button><button id="filterFemaleModal" class="filter-btn">♀ إناث</button></div><div id="studentsCompletedListModal"></div><button class="btn" id="closeStatsModal" style="margin-top:15px;">إغلاق</button></div></div>
            <div id="studentTasksModal" class="modal"><div class="modal-content"><h3 id="studentTasksTitle" style="color:#1f5437;"></h3><div id="studentTasksList" style="margin:15px 0;"></div><button class="btn" id="closeStudentTasksModal">إغلاق</button></div></div>
            <div id="allStudentsModal" class="modal"><div class="modal-content"><h3 style="color:#1f5437;">قائمة الطلاب</h3><div class="filter-buttons"><button id="filterAll" class="filter-btn active">الكل</button><button id="filterMale" class="filter-btn">♂ ذكور</button><button id="filterFemale" class="filter-btn">♀ إناث</button></div><div id="allStudentsList"></div><button class="btn" id="closeAllStudentsModal" style="margin-top:15px;">إغلاق</button></div></div>
            <div id="editScheduleModal" class="modal"><div class="modal-content" style="max-width:900px;"><h3 style="color:#1f5437;">✏️ تعديل الخطة الدراسية</h3><div id="editScheduleFields"></div></div></div>
            <div id="customMessageModal" class="modal"><div class="modal-content" style="text-align:center; max-width:350px;"><i class="fas fa-check-circle" style="font-size:3rem; color:#2c6e3c;"></i><p id="customMessageText" style="margin-top:10px;"></p></div></div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        document.getElementById('closeStatsModal')?.addEventListener('click', () => document.getElementById('taskStatsModal').classList.remove('active'));
        document.getElementById('closeStudentTasksModal')?.addEventListener('click', () => document.getElementById('studentTasksModal').classList.remove('active'));
        document.getElementById('closeAllStudentsModal')?.addEventListener('click', () => document.getElementById('allStudentsModal').classList.remove('active'));
    }
    addModals();
    initApp();
</script>
